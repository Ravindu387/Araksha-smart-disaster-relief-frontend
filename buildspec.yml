version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 20
    commands:
      - npm install --legacy-peer-deps
  build:
    commands:
      - npm run build -- --configuration=production

artifacts:
  files:
    - '**/*'
  base-directory: 'dist/Araksha-smart-disaster-relief-frontend/browser'
  
<div class="fixed left-0 top-0 h-screen w-64 bg-slate-950 text-white flex flex-col">

  <!-- Logo -->
  <div class="flex items-center gap-3 p-6 border-b border-slate-800">
    <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center">
      🛡️
    </div>
    <h2 class="text-xl font-bold">SDRMS</h2>
  </div>

  <!-- Alert -->
  <div class="m-4 p-4 rounded-2xl border border-pink-500 bg-pink-950">
    <h3 class="font-bold text-pink-400">47 Active Incidents</h3>
    <p class="text-sm text-pink-300">12 critical priority</p>
  </div>

  <!-- Menu -->
  <div class="px-4 flex-1 overflow-y-auto">

    <p class="text-xs text-slate-500 mb-3">OVERVIEW</p>

    <a
      routerLink="/admin/dashboard"
      routerLinkActive="bg-blue-600"
      [routerLinkActiveOptions]="{exact: true}"
      class="flex items-center px-4 py-3 rounded-xl hover:bg-slate-800 mb-2 transition cursor-pointer"
    >
      Dashboard
    </a>

    <p class="text-xs text-slate-500 mt-6 mb-3">OPERATIONS</p>

    <a class="flex justify-between px-4 py-3 rounded-xl hover:bg-slate-800 transition cursor-pointer">
      <span>Emergency Requests</span>
      <span class="bg-pink-500 px-2 rounded-full text-xs">12</span>
    </a>

    <a class="block px-4 py-3 rounded-xl hover:bg-slate-800 transition cursor-pointer">
      Volunteers
    </a>

    <a class="block px-4 py-3 rounded-xl hover:bg-slate-800 transition cursor-pointer">
      Shelters
    </a>

    <p class="text-xs text-slate-500 mt-6 mb-3">RESOURCES</p>

    <a
      routerLink="/admin/inventory"
      routerLinkActive="bg-blue-600"
      class="block px-4 py-3 rounded-xl hover:bg-slate-800 transition cursor-pointer"
    >
      Inventory
    </a>

    <a class="block px-4 py-3 rounded-xl hover:bg-slate-800 transition cursor-pointer">
      Allocation
    </a>

  </div>

  <!-- User -->
  <div class="p-4 border-t border-slate-800 flex items-center gap-3">
    <div class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center">
      A
    </div>

    <div>
      <h4 class="font-semibold">Admin Kumar</h4>
      <p class="text-xs text-slate-400">System Admin</p>
    </div>
  </div>

</div>

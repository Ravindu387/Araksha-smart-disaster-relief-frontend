<header class="fixed top-0 left-72 right-0 z-10 h-20 bg-white border-b border-gray-100 flex items-center gap-6 px-8">
  <!-- Breadcrumb -->
  <div class="flex items-center gap-2 text-sm shrink-0">
    @for (crumb of breadcrumb; track crumb; let last = $last) {
      <span [class.text-gray-400]="!last" [class.font-semibold]="last" [class.text-gray-900]="last">{{ crumb }}</span>
      @if (!last) {
        <span class="text-gray-300">/</span>
      }
    }
  </div>

  <!-- Search -->
  <div class="flex-1 max-w-md">
    <div class="relative">
      <app-icon name="search" class="w-[18px] h-[18px] text-gray-400 absolute left-3.5 top-1/2 -translate-y-1/2" />
      <input
        type="text"
        placeholder="Search emergencies, volunteers..."
        class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-gray-200 bg-gray-50 text-sm text-gray-700 placeholder:text-gray-400 outline-none focus:bg-white focus:ring-2 focus:ring-blue-500/25 focus:border-blue-400 transition"
      />
    </div>
  </div>

  <!-- Right side -->
  <div class="flex items-center gap-5 ml-auto shrink-0">
    <button
      type="button"
      aria-label="Notifications"
      class="relative w-10 h-10 rounded-full flex items-center justify-center text-gray-500 hover:bg-gray-100 hover:text-gray-700 transition-colors"
    >
      <app-icon name="bell" class="w-[20px] h-[20px]" />
      @if (notificationCount > 0) {
        <span class="absolute top-2 right-2 w-2 h-2 rounded-full bg-rose-500 ring-2 ring-white"></span>
      }
    </button>

    <button type="button" class="flex items-center gap-2.5 group">
      <div class="w-9 h-9 rounded-full bg-blue-600 text-white flex items-center justify-center text-sm font-semibold shrink-0">
        A
      </div>
      <span class="text-sm font-medium text-gray-800">{{ adminName }}</span>
      <app-icon name="chevron-down" class="w-4 h-4 text-gray-400 group-hover:text-gray-600" />
    </button>
  </div>
</header>

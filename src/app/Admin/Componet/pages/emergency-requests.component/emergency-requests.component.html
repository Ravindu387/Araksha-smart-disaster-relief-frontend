<div class="bg-slate-50 min-h-screen">



<div class="bg-white border-b">

<div class="max-w-7xl mx-auto flex justify-between items-center p-5">

<div>

<span class="text-gray-400">Admin</span>

<span class="mx-2">/</span>

<span class="font-semibold">Emergency Requests</span>

</div>

<div class="flex gap-5 items-center">

<input

type="text"

placeholder="Search emergencies..."

class="border rounded-full px-4 py-2 w-96 outline-none"
/>

<div
class="w-10 h-10 rounded-full bg-blue-600 text-white flex items-center justify-center">
A
</div>

<span>Admin Kumar</span>

</div>

</div>

</div>



<div class="max-w-7xl mx-auto p-8">

<div class="flex justify-between">

<div>

<h1 class="text-5xl font-bold">

Emergency Requests

</h1>

<p class="text-gray-500 mt-2">

2 of 8 requests

</p>

</div>

<button

class="bg-slate-900 text-white px-6 py-3 rounded-full">

Export CSV

</button>

</div>



<div class="flex gap-4 mt-8">

<button class="bg-slate-900 text-white px-6 py-2 rounded-full">

All 8

</button>

<button class="border rounded-full px-5 py-2">

Critical 2

</button>

<button class="border rounded-full px-5 py-2">

High 3

</button>

<button class="border rounded-full px-5 py-2">

Pending 2

</button>

</div>



<div class="flex gap-4 mt-8">

<input

type="text"

placeholder="Search requests..."

class="flex-1 border rounded-full px-5 py-3"/>

<select

[(ngModel)]="typeFilter"

class="border rounded-full px-6 py-3">

<option>All</option>

<option>Flood</option>

<option>Fire</option>

<option>Earthquake</option>

<option>Medical</option>

<option>Landslide</option>

</select>

<select

[(ngModel)]="statusFilter"

class="border rounded-full px-6 py-3">

<option>Pending</option>

<option>Assigned</option>

<option>Resolved</option>

<option>In Progress</option>

</select>

</div>



<div class="mt-8 bg-white rounded-xl shadow overflow-hidden">

<table class="w-full">

<thead class="bg-gray-50">

<tr>

<th class="p-4 text-left">Request ID</th>

<th class="text-left">Citizen</th>

<th class="text-left">Type</th>

<th class="text-left">Priority</th>

<th class="text-left">Status</th>

<th class="text-left">Location</th>

<th class="text-left">Volunteer</th>

<th class="text-left">Time</th>

</tr>

</thead>

<tbody>

<tr
*ngFor="let item of requests"
class="border-t">

<td class="p-4 text-blue-600">

{{item.id}}

</td>

<td>

<div class="flex items-center gap-3">

<div

class="w-10 h-10 rounded-full bg-gray-200 flex items-center justify-center">

{{item.initials}}

</div>

{{item.citizen}}

</div>

</td>

<td>

<span
class="bg-orange-100 text-orange-600 px-3 py-1 rounded-full">

{{item.type}}

</span>

</td>

<td>

<span

class="bg-red-100 text-red-600 px-4 py-1 rounded-full">

{{item.priority}}

</span>

</td>

<td>

<span

class="bg-gray-100 text-gray-700 px-4 py-1 rounded-full">

{{item.status}}

</span>

</td>

<td>

{{item.location}}

</td>

<td>

{{item.volunteer}}

</td>

<td>

{{item.time}}

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

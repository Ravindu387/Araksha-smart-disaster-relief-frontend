<div class="flex flex-col h-full bg-gray-50">

  <div class="flex-1 overflow-y-auto px-8 py-7">

    <div class="flex items-start justify-between mb-6">
      <div>
        <h1 class="text-[22px] font-bold text-gray-900 leading-tight">Notification Center</h1>
        <p class="text-sm text-gray-400 mt-0.5">
          {{ unreadCount === 0
              ? '0 unread notifications'
              : unreadCount + ' unread notification' + (unreadCount > 1 ? 's' : '') }}
        </p>
      </div>

      <button
        (click)="markAllRead()"
        class="flex items-center gap-1.5 px-3.5 py-2 text-sm font-semibold text-gray-700 bg-white border border-gray-200 hover:border-gray-300 rounded-xl hover:bg-gray-50 transition-colors cursor-pointer shadow-sm"
      >
        ✓ Mark all read
      </button>
    </div>

    <div class="bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm">

      <div class="flex border-b border-gray-200 px-6 gap-2 bg-white">
        <button
          *ngFor="let tab of tabs"
          (click)="setTab(tab.key)"
          class="flex items-center gap-2 px-4 py-4 text-sm font-semibold border-b-2 -mb-px transition-all cursor-pointer"
          [ngClass]="{
            'text-blue-600 border-blue-600': activeTab === tab.key,
            'text-slate-500 border-transparent hover:text-slate-700': activeTab !== tab.key
          }"
        >
          {{ tab.label }}
          <span
            *ngIf="getTabUnreadCount(tab.key) > 0"
            class="min-w-[18px] h-[18px] px-1.5 rounded-full text-[10px] font-bold flex items-center justify-center bg-red-500 text-white shrink-0"
          >{{ getTabUnreadCount(tab.key) }}</span>
        </button>
      </div>

      <ng-container *ngIf="filteredNotifications.length > 0; else emptyState">
        <div
          *ngFor="let notif of filteredNotifications; let last = last"
          class="flex items-start gap-5 px-6 py-5 bg-white border-b border-gray-100 hover:bg-slate-50/50 transition-colors cursor-pointer"
          (click)="markAsRead(notif.id)"
        >
         
          <div class="flex items-center justify-center w-3 shrink-0 mt-2.5">
            <span
              *ngIf="!notif.read"
              class="w-1.5 h-1.5 rounded-full bg-blue-600 shrink-0"
            ></span>
          </div>

          
          <div
            class="w-1 self-stretch rounded-full shrink-0 min-h-[44px]"
            [ngClass]="{
              'bg-red-500': notif.severity === 'critical',
              'bg-orange-500': notif.severity === 'high',
              'bg-blue-500': notif.severity === 'info',
              'bg-green-500': notif.severity === 'success'
            }"
          ></div>

      
          <div
            class="w-10 h-10 rounded-full flex items-center justify-center shrink-0 border"
            [ngClass]="{
              'bg-red-55 text-red-500 border-red-100': notif.severity === 'critical',
              'bg-orange-55 text-orange-500 border-orange-100': notif.severity === 'high',
              'bg-blue-55 text-blue-500 border-blue-100': notif.severity === 'info',
              'bg-green-55 text-green-500 border-green-100': notif.severity === 'success'
            }"
            [style.backgroundColor]="notif.severity === 'critical' ? '#fef2f2' : notif.severity === 'high' ? '#fff7ed' : notif.severity === 'info' ? '#eff6ff' : '#f0fdf4'"
          >
           
            <ng-container [ngSwitch]="notif.category">
             
              <svg *ngSwitchCase="'alerts'" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                <line x1="12" y1="9" x2="12" y2="13"/>
                <line x1="12" y1="17" x2="12.01" y2="17"/>
              </svg>
              
              <svg *ngSwitchCase="'assignments'" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
              </svg>
             
              <svg *ngSwitchCase="'inventory'" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
              </svg>
         
              <svg *ngSwitchCase="'shelters'" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
              </svg>
            </ng-container>
          </div>

          
          <div class="flex-1 min-w-0">
            <div class="flex items-center gap-2 mb-1 flex-wrap">
              <span class="text-[15px] font-bold text-slate-900 leading-snug">{{ notif.title }}</span>
              <span
                class="text-[10px] font-bold uppercase tracking-wider px-2 py-0.5 rounded-md"
                [ngClass]="{
                  'bg-red-100 text-red-600 border border-red-200': notif.severity === 'critical',
                  'bg-orange-100 text-orange-600 border border-orange-200': notif.severity === 'high',
                  'bg-blue-100 text-blue-600 border border-blue-200': notif.severity === 'info',
                  'bg-green-100 text-green-600 border border-green-200': notif.severity === 'success'
                }"
              >{{ notif.badge }}</span>
            </div>
            <p class="text-[13px] text-slate-500 leading-relaxed font-medium mt-1">{{ notif.desc }}</p>

            <button
              *ngIf="!notif.read"
              (click)="markAsRead(notif.id); $event.stopPropagation()"
              class="mt-2 flex items-center gap-1 text-[12px] font-bold text-blue-600 hover:text-blue-800 transition-colors cursor-pointer"
            >
              ✓ Mark as read
            </button>
          </div>

         
          <div class="flex items-center gap-1.5 text-xs text-slate-400 font-medium shrink-0 mt-1 whitespace-nowrap">
            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <circle cx="12" cy="12" r="10"/>
              <polyline points="12 6 12 12 16 14"/>
            </svg>
            {{ notif.time }}
          </div>
        </div>
      </ng-container>

      <ng-template #emptyState>
        <div class="flex flex-col items-center justify-center py-16 text-gray-400">
          <svg class="w-10 h-10 mb-3 opacity-40" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <p class="text-sm">No unread notifications.</p>
        </div>
      </ng-template>

    </div>
  </div>
</div>

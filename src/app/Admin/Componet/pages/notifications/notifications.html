<div class="p-6 bg-slate-100 min-h-screen">

    <!-- Header -->

    <div class="mb-6">
        <h1 class="text-3xl font-bold text-slate-800">
            Notifications
        </h1>

        <p class="text-slate-500 mt-1">
            Disaster alerts and system updates
        </p>
    </div>

    <!-- Stats -->

    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">

        <div class="bg-white rounded-xl shadow p-4">
            <h3 class="text-sm text-slate-500">Total</h3>
            <p class="text-3xl font-bold text-blue-600">24</p>
        </div>

        <div class="bg-white rounded-xl shadow p-4">
            <h3 class="text-sm text-slate-500">Critical</h3>
            <p class="text-3xl font-bold text-red-500">4</p>
        </div>

        <div class="bg-white rounded-xl shadow p-4">
            <h3 class="text-sm text-slate-500">Warnings</h3>
            <p class="text-3xl font-bold text-orange-500">8</p>
        </div>

        <div class="bg-white rounded-xl shadow p-4">
            <h3 class="text-sm text-slate-500">Resolved</h3>
            <p class="text-3xl font-bold text-green-500">12</p>
        </div>

    </div>

    <!-- Notifications List -->

    <div class="space-y-4">

        <div
            *ngFor="let item of notifications"
            class="bg-white rounded-xl shadow hover:shadow-lg transition duration-300">

            <div class="flex items-center p-5">

                <div
                    class="w-14 h-14 rounded-full flex items-center justify-center text-2xl mr-4"

                    [ngClass]="{
                    'bg-red-100': item.type === 'danger',
                    'bg-green-100': item.type === 'success',
                    'bg-blue-100': item.type === 'info',
                    'bg-orange-100': item.type === 'warning'
                    }">

                    {{item.icon}}

                </div>

                <div class="flex-1">

                    <h3 class="font-semibold text-lg text-slate-800">
                        {{item.title}}
                    </h3>

                    <p class="text-slate-500">
                        {{item.message}}
                    </p>

                </div>

                <div class="text-sm text-slate-400">
                    {{item.time}}
                </div>

            </div>

        </div>

    </div>

</div>

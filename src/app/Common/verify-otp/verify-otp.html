<!-- verify-otp.html — matches the Login page layout exactly -->
<div class="min-h-screen flex flex-col lg:flex-row">

  <!-- LEFT PANEL -->
  <div class="lg:w-1/2 bg-gradient-to-br from-slate-950 via-blue-950 to-black text-white px-10 py-8 flex flex-col justify-between">

    <div>
      <button (click)="goBack()"
        class="text-gray-400 text-sm flex items-center gap-2 hover:text-white transition">
        ← Back
      </button>

      <div class="flex items-center gap-3 mt-20">
        <div class="w-22 h-22 rounded-xl flex items-center justify-center shadow-lg">
          <img src="assets/images/logo.png" alt="Araksha Logo" class="w-20 h-20 object-contain" />
        </div>
        <h2 class="text-2xl font-bold">ADRMS</h2>
      </div>

      <div class="mt-16">
        <h1 class="text-4xl font-extrabold leading-tight">
          Check your<br />inbox.
        </h1>
        <p class="mt-6 text-gray-400 text-base max-w-lg leading-7">
          We sent a 6-digit OTP to
          <span class="text-white font-semibold">{{ email || 'your email' }}</span>.
          It expires in 5 minutes.
        </p>
      </div>
    </div>

    <div class="text-xs text-gray-500 mt-10">
      © 2025 ADRMS · Emergency Response Platform
    </div>

  </div>

  <!-- RIGHT PANEL -->
  <div class="lg:w-1/2 bg-gray-50 flex items-center justify-center p-8">

    <div class="w-full max-w-md">

      <h1 class="text-4xl font-bold text-gray-900">Verify OTP</h1>
      <p class="text-gray-500 mt-2">
        Enter the 6-digit code sent to your email
      </p>

      <!-- OTP FIELD -->
      <div class="mt-8">
        <label class="block text-sm font-medium text-gray-700 mb-2">
          One-Time Password (OTP)
        </label>
        <input
          type="text"
          [(ngModel)]="otp"
          name="otp"
          maxlength="6"
          class="w-full px-4 py-3 border border-gray-300 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none tracking-[0.5em] text-center text-xl font-bold"
          placeholder="000000"
          [disabled]="isLoading" />
        <p class="text-xs text-gray-400 mt-2 px-1">
          Sent to: <span class="font-medium text-gray-600">{{ email }}</span>
        </p>
      </div>

      <!-- ERROR MESSAGE -->
      <p *ngIf="errorMessage" class="text-red-500 text-sm mt-3 px-1">
        {{ errorMessage }}
      </p>

      <!-- SUCCESS MESSAGE -->
      <p *ngIf="successMessage" class="text-green-600 text-sm mt-3 px-1 font-medium">
        ✓ {{ successMessage }}
      </p>

      <!-- VERIFY BUTTON -->
      <button
        (click)="verifyOtp()"
        [disabled]="isLoading"
        class="w-full mt-6 py-3 rounded-2xl bg-gradient-to-r from-blue-500 to-blue-700 text-white font-semibold shadow-lg hover:shadow-xl transition disabled:opacity-60 disabled:cursor-not-allowed">
        <span *ngIf="!isLoading">Verify OTP</span>
        <span *ngIf="isLoading">Verifying…</span>
      </button>

      <!-- RESEND OTP -->
      <div class="text-center mt-6">
        <span class="text-gray-500 text-sm">Didn't receive the code? </span>
        <button (click)="resendOtp()"
          class="text-blue-600 font-semibold text-sm hover:underline">
          Resend OTP
        </button>
      </div>

    </div>
  </div>

</div>
